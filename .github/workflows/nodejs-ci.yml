# Runs build and tests with Node.js. The version is taken from .node-version

name: Node CI

on:
  push:
    branches:
      - main
      - master
  # Consolidate PR events to pull_request_target only (using both pull_request and
  # pull_request_target simultaneously can cause finished-node-ci's skipped result
  # to incorrectly pass required checks)
  # pull_request_target fires for both same-repo PRs and fork PRs
  # Same-repo PR: environment: is an empty string, so runs without approval
  # Fork PR:      blocked by the environment: fork-pr-build approval gate
  pull_request_target:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  # Defensively includes event_name so that events do not cancel each other
  # even if a pull_request trigger is added in the future
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Disable default permissions for the entire workflow (each job explicitly sets minimum permissions)
permissions: {}

jobs:
  post-approval-request:
    name: Post approval request
    runs-on: ubuntu-latest
    # Post an approval request only for fork PRs (not needed for same-repo PRs)
    if: github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository
    # Comment posting failures should not affect the workflow conclusion (the security gate is ensured by environment:)
    continue-on-error: true
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Find existing approval request comment
        id: find-comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: fork-pr-build

      - name: Post or update approval request comment
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## Waiting for Environment approval

            To run the build for this PR, approval for the Environment `fork-pr-build` is required.

            [Please review and approve the Actions run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}?pr=${{ github.event.pull_request.number }})

  node-ci:
    runs-on: ubuntu-latest
    needs: post-approval-request
    # Always run regardless of the post-approval-request result
    # Must not be skipped due to a comment posting failure, as the security gate is ensured by environment:
    if: >-
      always() && (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule' ||
        github.event_name == 'pull_request_target'
      )
    # Manual approval via Environment is required only for fork PRs (not needed for same-repo PRs)
    environment: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && 'fork-pr-build' || '' }}
    permissions:
      contents: read

    services:
      mysql:
        image: mysql:9.7
        env:
          MYSQL_ROOT_PASSWORD: rootPassword
          MYSQL_USER: pixiv-ts
          MYSQL_PASSWORD: pixiv-ts-test
          MYSQL_DATABASE: pixiv-ts
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: 🏗 Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        id: pnpm-install
        with:
          run_install: false

      - name: 📃 Check package.json definition
        id: package-json
        run: |
          compile=$(jq '.scripts | has("compile")' package.json)
          build=$(jq '.scripts | has("build")' package.json)
          generate=$(jq '.scripts | has("generate")' package.json)
          package=$(jq '.scripts | has("package")' package.json)
          lint=$(jq '.scripts | has("lint")' package.json)
          test=$(jq '.scripts | has("test")' package.json)

          echo "compile: $compile"
          echo "build: $build"
          echo "generate: $generate"
          echo "package: $package"
          echo "lint: $lint"
          echo "test: $test"

          echo "compile=$compile" >> $GITHUB_OUTPUT
          echo "build=$build" >> $GITHUB_OUTPUT
          echo "generate=$generate" >> $GITHUB_OUTPUT
          echo "package=$package" >> $GITHUB_OUTPUT
          echo "lint=$lint" >> $GITHUB_OUTPUT
          echo "test=$test" >> $GITHUB_OUTPUT

      - name: 📂 Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: 📂 Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 👨🏻‍💻 Install dependencies
        run: |
          pnpm install --frozen-lockfile --prefer-frozen-lockfile

      - name: 👀 Run linter
        if: steps.package-json.outputs.lint == 'true'
        run: pnpm run lint

      - name: 🎁 Run package
        if: steps.package-json.outputs.package == 'true'
        run: pnpm run package

      - name: 🏃 Run compile
        if: steps.package-json.outputs.compile == 'true'
        run: pnpm run compile

      - name: 🧪 Run tests
        if: steps.package-json.outputs.test == 'true'
        run: pnpm run test
        env:
          PIXIV_REFRESH_TOKEN: ${{ secrets.PIXIV_REFRESH_TOKEN }}
          NODE_ENV: test
          RESPONSE_DB_HOSTNAME: localhost
          RESPONSE_DB_USERNAME: pixiv-ts
          RESPONSE_DB_PASSWORD: pixiv-ts-test
          RESPONSE_DB_DATABASE: pixiv-ts
          RESPONSE_DB_PORT: 3306

      - name: ☑️ Check Dependencies
        if: steps.package-json.outputs.disabled-depcheck == 'false'
        run: npx depcheck

      - name: Check exists dist directory
        id: check-dist
        run: |
          IS_DIRECTORY=$(test -d dist && echo true || echo false)
          IS_SYMLINK=$(test -L dist && echo true || echo false)
          echo "exists=$(test $IS_DIRECTORY = true && $IS_NOT_SYMLINK = false && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: 📦 Upload dist artifact
        if: steps.check-dist.outputs.exists == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist

      - name: Check exists output directory
        id: check-output
        run: |
          IS_DIRECTORY=$(test -d output && echo true || echo false)
          IS_SYMLINK=$(test -L output && echo true || echo false)
          echo "exists=$(test $IS_DIRECTORY = true && $IS_NOT_SYMLINK = false && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: 📦 Upload output artifact
        if: steps.check-output.outputs.exists == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: output
          path: output

      - name: 👀 Check git status
        run: |
          git status
          git diff --exit-code || (echo "Git status is not clean." && exit 1)

  finished-node-ci:
    name: Check finished Node CI
    runs-on: ubuntu-latest
    # Do not run this job if the node-ci job was skipped (needs.node-ci.result == 'skipped')
    # Actual CI checks are based on the result of the node-ci job
    if: always() && needs.node-ci.result != 'skipped'
    needs:
      - node-ci
    permissions: {}

    steps:
      - name: Check finished Node CI
        # post-approval-request is for notification only; its failure should not affect CI
        # The security gate is ensured by node-ci's environment:, so only the node-ci result is checked
        run: |
          if [ "${{ needs.node-ci.result }}" != "success" ]; then
            echo "Build failed"
            exit 1
          fi
