# Runs build and tests with Node.js. The version is taken from .node-version

name: Node CI

on:
  push:
    branches:
      - master
      # develop is intentionally excluded: every push to develop updates the
      # develop→master Release PR, which fires pull_request_target:synchronize
      # and runs CI via that event.  Including develop here would run CI twice.

  # Consolidate PR events to pull_request_target only (using both pull_request and
  # pull_request_target simultaneously can cause finished-node-ci's skipped result
  # to incorrectly pass required checks)
  # pull_request_target fires for both same-repo PRs and fork PRs
  # Same-repo PR: environment: is an empty string, so runs without approval
  # Fork PR:      blocked by the environment: fork-pr-build approval gate
  pull_request_target:
    branches:
      - master
      - develop
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  # Defensively includes event_name so that events do not cancel each other
  # even if a pull_request trigger is added in the future
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Disable default permissions for the entire workflow (each job explicitly sets minimum permissions)
permissions: {}

jobs:
  post-approval-request:
    name: Post approval request
    runs-on: ubuntu-latest
    # Post an approval request only for fork PRs (not needed for same-repo PRs)
    if: github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository
    # Comment posting failures should not affect the workflow conclusion (the security gate is ensured by environment:)
    continue-on-error: true
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Find existing approval request comment
        id: find-comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: fork-pr-build

      - name: Post or update approval request comment
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## Waiting for Environment approval

            To run the build for this PR, approval for the Environment `fork-pr-build` is required.

            [Please review and approve the Actions run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}?pr=${{ github.event.pull_request.number }})

  node-ci:
    runs-on: ubuntu-latest
    needs: post-approval-request
    # Always run regardless of the post-approval-request result
    # Must not be skipped due to a comment posting failure, as the security gate is ensured by environment:
    if: >-
      always() && (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule' ||
        github.event_name == 'pull_request_target'
      )
    # Manual approval via Environment is required only for fork PRs (not needed for same-repo PRs)
    environment: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && 'fork-pr-build' || '' }}
    permissions:
      contents: read

    services:
      mysql:
        image: mysql:9.6
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: pixiv-ts
          MYSQL_PASSWORD: pixiv-ts-test
          MYSQL_DATABASE: pixiv-ts
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root --password=root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          # actions/checkout v7 blocks fork PR checkout under pull_request_target by default; safe here since environment: above already gates fork PRs behind manual approval
          allow-unsafe-pr-checkout: true

      - name: 🏗 Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        id: pnpm-install
        with:
          run_install: false

      - name: 📂 Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: 📂 Setup pnpm cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile --prefer-frozen-lockfile

      - name: 🏗 Build
        run: pnpm run build

      - name: 👀 Run linter
        run: pnpm run lint

      - name: 🧪 Run tests
        run: pnpm run test

      - name: 🧪 Run db-mysql integration tests
        run: pnpm --filter @book000/pixivts-db-mysql run test:integration
        env:
          RESPONSE_DB_HOSTNAME: 127.0.0.1
          RESPONSE_DB_PORT: 3306
          RESPONSE_DB_USERNAME: pixiv-ts
          RESPONSE_DB_PASSWORD: pixiv-ts-test
          RESPONSE_DB_DATABASE: pixiv-ts

      - name: 🧪 Run core e2e tests
        # Run on push (main/master), scheduled, and manual runs — not on PRs.
        # The e2e tests hit the real pixiv API and fail flakily due to API state
        # changes (deleted works, rate limits), which is unrelated to the PR changes.
        # Coverage is maintained by the daily scheduled run and master push runs.
        # Using a denylist (not pull_request_target) rather than an allowlist so that
        # any new event triggers also run e2e by default, which is the safe direction.
        if: github.event_name != 'pull_request_target'
        run: pnpm --filter @book000/pixivts run test:e2e
        env:
          PIXIV_REFRESH_TOKEN: ${{ secrets.PIXIV_REFRESH_TOKEN }}

      - name: 🛡 dts:guard — verify no zod in dist .d.ts
        run: node scripts/check-dts-no-zod.mjs

      - name: 🔍 Smoke — verify no zod in dist JS
        run: |
          if grep -rqE "from ['\"]zod['\"]|require\(['\"]zod" packages/core/dist/*.js 2>/dev/null; then
            echo "ERROR: zod reference found in packages/core/dist JS"
            exit 1
          fi
          echo "OK: no zod in dist JS"

      - name: 🔍 Smoke — ESM import
        run: |
          node -e "
            import('./packages/core/dist/index.js').then(m => {
              if (!m.PixivClient) throw new Error('PixivClient not exported');
              console.log('ESM smoke OK');
            }).catch(e => { console.error(e); process.exit(1); });
          "

      - name: 🔍 Smoke — CJS require
        run: |
          node --input-type=commonjs -e "
            const m = require('./packages/core/dist/index.cjs');
            if (!m.PixivClient) throw new Error('PixivClient not exported');
            console.log('CJS smoke OK');
          "

      - name: 👀 Check git status
        run: |
          git status
          git diff --exit-code || (echo "Git status is not clean." && exit 1)

  finished-node-ci:
    name: Check finished Node CI
    runs-on: ubuntu-latest
    # Do not run this job if the node-ci job was skipped (needs.node-ci.result == 'skipped')
    # Actual CI checks are based on the result of the node-ci job
    if: always() && needs.node-ci.result != 'skipped'
    needs:
      - node-ci
    permissions: {}

    steps:
      - name: Check finished Node CI
        # post-approval-request is for notification only; its failure should not affect CI
        # The security gate is ensured by node-ci's environment:, so only the node-ci result is checked
        run: |
          if [ "${{ needs.node-ci.result }}" != "success" ]; then
            echo "Build failed"
            exit 1
          fi
