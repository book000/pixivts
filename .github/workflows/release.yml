name: Release

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}

# TODO(monorepo): This workflow was written for the legacy flat package structure.
# It must be updated for independent package versioning and publishing from
# packages/core and packages/db-mysql. The steps below have been minimally
# updated to not reference the deleted src/ directory, but the publish step
# still needs a per-package implementation.

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🏗 Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        id: pnpm-install
        with:
          run_install: false

      - name: 📂 Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: 📂 Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile --prefer-frozen-lockfile

      - name: 🏃 Build
        run: pnpm run build

      - name: 🔍 Verify dist contents
        run: |
          test -f packages/core/dist/index.js
          test -f packages/core/dist/index.d.ts
          test -f packages/core/dist/index.cjs
          test -f packages/core/dist/index.d.cts

      - name: 📦 Verify core pack contents
        run: |
          mkdir -p /tmp/pack-check
          pnpm --filter @book000/pixivts pack --pack-destination /tmp/pack-check
          TARBALL=$(ls /tmp/pack-check/*.tgz | head -1)
          echo "Inspecting $TARBALL"
          tar -tzf "$TARBALL" | tee /tmp/pack-files.txt
          grep -q '^package/dist/index.js$' /tmp/pack-files.txt
          grep -q '^package/dist/index.d.ts$' /tmp/pack-files.txt

      - name: 🏷 Bump version and push tag
        id: tag-version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: 'minor'
          custom_release_rules: 'feat:minor:✨ Features,fix:patch:🐛 Fixes,docs:patch:📰 Docs,chore:patch:🎨 Chore,pref:patch:🎈 Performance improvements,refactor:patch:🧹 Refactoring,build:patch:🔍 Build,ci:patch:🔍 CI,revert:patch:⏪ Revert,style:patch:🧹 Style,test:patch:👀 Test,release:major:📦 Release'

      - name: 📝 Update package.json versions
        run: |
          pnpm --filter @book000/pixivts version --no-git-tag-version ${{ steps.tag-version.outputs.new_version }}
          pnpm --filter @book000/pixivts-db-mysql version --no-git-tag-version ${{ steps.tag-version.outputs.new_version }}

      - name: 🔬 Lint
        run: pnpm run lint

      - name: 📦 Publish packages
        run: |
          pnpm --filter @book000/pixivts publish --access public --no-git-checks --ignore-scripts
          pnpm --filter @book000/pixivts-db-mysql publish --access public --no-git-checks --ignore-scripts

      - name: 📃 Create Release
        id: create_release
        uses: ncipollo/release-action@v1.21.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: ${{ steps.tag-version.outputs.new_tag }}
          name: ${{ steps.tag-version.outputs.new_tag }}
          body: ${{ steps.tag-version.outputs.changelog }}
          draft: false
          prerelease: false
