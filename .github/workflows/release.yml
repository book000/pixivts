name: Release

on:
  push:
    branches:
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: 🏗 Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        id: pnpm-install
        with:
          run_install: false

      - name: 📂 Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: 📂 Setup pnpm cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile --prefer-frozen-lockfile

      - name: 🏗 Build
        run: pnpm run build

      - name: 🔍 Verify dist contents
        run: |
          test -f packages/core/dist/index.js
          test -f packages/core/dist/index.d.ts
          test -f packages/core/dist/index.cjs
          test -f packages/core/dist/index.d.cts

      - name: 📦 Verify core pack contents
        run: |
          mkdir -p /tmp/pack-check
          pnpm --filter @book000/pixivts pack --pack-destination /tmp/pack-check
          TARBALL=$(ls /tmp/pack-check/*.tgz | head -1)
          echo "Inspecting $TARBALL"
          tar -tzf "$TARBALL" | tee /tmp/pack-files.txt
          grep -q '^package/dist/index.js$' /tmp/pack-files.txt
          grep -q '^package/dist/index.d.ts$' /tmp/pack-files.txt

      - name: 🔬 Lint
        run: pnpm run lint

      - name: 🚀 Release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔀 Back-merge master into develop
        # Run only after a stable release (master push) so that the release tag
        # enters develop's ancestry — required for semantic-release to start a
        # fresh pre-release cycle with the correct next version (e.g. v0.61.0-beta.1).
        # Uses DEPLOY_KEY (SSH deploy key with write access) to push to the protected
        # develop branch.  Configure it in repo Settings → Deploy keys and add it as
        # a bypass actor in the develop branch ruleset.
        if: github.ref == 'refs/heads/master'
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          trap 'rm -f ~/.ssh/deploy_key' EXIT
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          git config core.sshCommand "ssh -i ~/.ssh/deploy_key -F /dev/null"
          git remote set-url origin git@github.com:${{ github.repository }}.git
          # After the Release PR is merged, master's merge commit has develop HEAD as
          # a parent, so pushing master HEAD to develop is always a valid fast-forward
          # in the normal workflow.  If develop has diverged due to a concurrent push,
          # this push fails — resolve manually by merging master into develop.
          git fetch origin develop
          git push origin HEAD:refs/heads/develop

  docs:
    needs: release
    if: ${{ github.ref == 'refs/heads/master' }}
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy-docs.yml
