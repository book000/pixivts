name: Release

on:
  push:
    branches:
      - main
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🏗 Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        id: pnpm-install
        with:
          run_install: false

      - name: 📂 Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: 📂 Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile --prefer-frozen-lockfile

      - name: 🏗 Build
        run: pnpm run build

      - name: 🔍 Verify dist contents
        run: |
          test -f packages/core/dist/index.js
          test -f packages/core/dist/index.d.ts
          test -f packages/core/dist/index.cjs
          test -f packages/core/dist/index.d.cts

      - name: 📦 Verify core pack contents
        run: |
          mkdir -p /tmp/pack-check
          pnpm --filter @book000/pixivts pack --pack-destination /tmp/pack-check
          TARBALL=$(ls /tmp/pack-check/*.tgz | head -1)
          echo "Inspecting $TARBALL"
          tar -tzf "$TARBALL" | tee /tmp/pack-files.txt
          grep -q '^package/dist/index.js$' /tmp/pack-files.txt
          grep -q '^package/dist/index.d.ts$' /tmp/pack-files.txt

      - name: 🔬 Lint
        run: pnpm run lint

      - name: 🚀 Release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
