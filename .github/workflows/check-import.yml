name: Check using src-import

on: [pull_request]

# ワークフロー全体のデフォルト権限を無効化（各ジョブで最小権限を明示する）
permissions: {}

jobs:
  check-import:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1

      - name: Check using src-import
        run: |
          COUNT=`grep -rEn "from 'src/" --include=*.ts src | tee ../import-src.txt | wc -l || true`
          echo count: $COUNT
          cat ../import-src.txt
          cat ../import-src.txt | reviewdog -efm="%f:%l:%m" -name="Check using src-import" -reporter=local -level=warning
          if [ "$COUNT" != "0" ]; then
            echo "Found src-import in $COUNT files"
            exit 1
          fi
