name: Check using src-import

on: [pull_request]

# Disable default permissions for the entire workflow (each job explicitly sets minimum permissions)
permissions: {}

jobs:
  check-import:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1

      - name: Check using src-import
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=`grep -rEn "from 'src/" --include=*.ts src | tee ../import-src.txt | wc -l || true`
          echo count: $COUNT
          cat ../import-src.txt
          cat ../import-src.txt | reviewdog -efm="%f:%l:%m" -name="Check using src-import" -reporter=github-annotations -level=warning
          if [ "$COUNT" != "0" ]; then
            echo "Found src-import in $COUNT files"
            exit 1
          fi
